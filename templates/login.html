<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Admin – TECNOMEDIC</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/tecnomedic.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            width: 100%;
            max-width: 380px;
            animation: fadeUp .7s ease both;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo img {
            height: 46px;
            width: auto;
            filter: brightness(0) invert(1);
        }

        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px 32px;
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0,0,0,.35);
        }

        .login-title {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 6px;
            text-align: center;
        }

        .login-title span { color: var(--teal); }

        .login-subtitle {
            font-size: 12px;
            color: var(--muted);
            text-align: center;
            letter-spacing: .06em;
            margin-bottom: 28px;
        }

        .login-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }

        .login-label {
            font-size: 10px;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .login-input-wrap { position: relative; }

        .login-input-icon {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 15px;
            color: var(--muted);
            pointer-events: none;
        }

        .login-input {
            width: 100%;
            background: rgba(255,255,255,.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px 12px 42px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: var(--white);
            outline: none;
            transition: border-color .2s, background .2s, box-shadow .2s;
        }

        .login-input:focus {
            border-color: var(--teal);
            background: rgba(0,180,216,.07);
            box-shadow: 0 0 0 3px rgba(0,180,216,.12);
        }

        .login-divider {
            height: 1px;
            background: var(--border);
            margin: 22px 0;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--teal), #0096c7);
            border: none;
            border-radius: 11px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14.5px;
            font-weight: 500;
            color: #fff;
            cursor: pointer;
            transition: transform .2s, box-shadow .2s;
            box-shadow: 0 6px 20px rgba(0,180,216,.3);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(0,180,216,.45);
        }

        .login-error {
            background: rgba(248,113,113,.1);
            border: 1px solid rgba(248,113,113,.3);
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 13px;
            color: #f87171;
            text-align: center;
            margin-bottom: 18px;
            animation: fadeUp .3s ease;
        }

        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: rgba(127,168,201,.35);
        }
    </style>
</head>
<body>

<div class="login-box">

    <div class="login-logo">
        <img src="/static/tecno_logo.png" alt="TECNOMEDIC">
    </div>

    <div class="login-card">
        <div class="login-title">Acceso <span>Admin</span></div>
        <div class="login-subtitle">Panel de gestión de turnos</div>

        {% if error %}
        <div class="login-error">🔒 {{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <div class="login-group">
                <div class="login-label">Usuario</div>
                <div class="login-input-wrap">
                    <span class="login-input-icon">👤</span>
                    <input class="login-input" type="text" name="usuario"
                            placeholder="Ingresá tu usuario" required autofocus>
                </div>
            </div>

            <div class="login-group">
                <div class="login-label">Contraseña</div>
                <div class="login-input-wrap">
                    <span class="login-input-icon">🔑</span>
                    <input class="login-input" type="password" name="password"
                            placeholder="••••••••" required>
                </div>
            </div>

            <div class="login-divider"></div>

            <button type="submit" class="login-btn">
                Ingresar al panel →
            </button>
            <div class="login-divider"></div>
            <button type="button" class="login-btn" onclick="window.location.href='/'">
                ⮌ &nbsp; Volver a Inicio
            </button>
        </form>
    </div>

    <div class="login-footer">© 2025 TECNOMEDIC · Acceso restringido</div>
</div>

</body>
</html>
