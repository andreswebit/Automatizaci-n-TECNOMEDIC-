# /etc/nginx/sites-available/tecnomedic
# Configuración Nginx para TECNOMEDIC
# Dominio: turnos.tecnomedic.com.ar
#
# Para aplicar:
#   sudo ln -s /etc/nginx/sites-available/tecnomedic /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# ── Redirigir HTTP → HTTPS ────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name turnos.tecnomedic.com.ar www.turnos.tecnomedic.com.ar;

    # Let's Encrypt necesita esta ruta para verificar el dominio
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Todo lo demás → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name turnos.tecnomedic.com.ar www.turnos.tecnomedic.com.ar;

    # Certificados SSL (generados por Certbot / Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/turnos.tecnomedic.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/turnos.tecnomedic.com.ar/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Seguridad extra
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            SAMEORIGIN                            always;
    add_header X-Content-Type-Options     nosniff                               always;
    add_header X-XSS-Protection           "1; mode=block"                       always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;

    # Tamaño máximo de upload (logos, imágenes)
    client_max_body_size 10M;

    # Logs
    access_log /var/log/nginx/tecnomedic_access.log;
    error_log  /var/log/nginx/tecnomedic_error.log;

    # ── Archivos estáticos — servidos directamente por Nginx ─────
    location /static/ {
        alias /var/www/tecnomedic/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Todo lo demás → Gunicorn (Flask) ─────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
